<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LevelUp AI Lab</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center hidden">
      <div class="text-center p-8 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl max-w-sm w-full mx-4">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-2">LevelUp AI Lab</h1>
        <p class="text-slate-400 mb-8">Sign in to start experimenting with Gemini.</p>
        <button id="login-button" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 px-6 rounded-xl font-medium transition-all flex items-center justify-center gap-3 active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8l4 4-4 4M8 12h7"/></svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <div id="app" class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col transition-all duration-300 -translate-x-full md:translate-x-0 fixed md:relative z-40 h-full">
        <div class="p-4 border-b border-slate-800 flex items-center justify-between">
          <h2 class="font-bold text-lg text-slate-100">My Chats</h2>
          <button id="new-chat-btn" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-blue-400 transition-colors" title="New Chat">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>

        <div class="px-4 py-2">
          <div class="relative">
            <input 
              type="text" 
              id="search-chats" 
              placeholder="Search chats..." 
              class="w-full bg-slate-800/50 text-xs text-slate-200 border border-slate-700 rounded-lg pl-8 pr-3 py-2 focus:outline-none focus:border-blue-500 transition-all"
            />
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-2.5 top-2.5 text-slate-500"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </div>
        </div>
        
        <div id="chat-history" class="flex-1 overflow-y-auto p-2 space-y-1">
          <!-- Chat history items will be injected here -->
        </div>
        
        <div class="p-4 border-t border-slate-800">
          <div id="user-profile" class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-800 transition-colors cursor-pointer group">
            <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full bg-slate-700" />
            <div class="flex-1 min-w-0">
              <p id="user-name" class="text-sm font-medium text-slate-200 truncate"></p>
              <p id="user-email" class="text-xs text-slate-500 truncate"></p>
            </div>
            <button id="logout-button" class="p-1.5 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col min-w-0 bg-slate-950 relative">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-4 md:px-8 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
          <div class="flex items-center gap-4">
            <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-400 hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 id="current-chat-title" class="text-lg font-semibold text-slate-100 truncate max-w-[200px] md:max-w-md">New Chat</h1>
          </div>
          <div class="flex items-center gap-2">
            <select id="model-selector" class="bg-slate-900 text-slate-300 text-[10px] font-bold uppercase tracking-widest rounded-md border border-slate-800 px-2 py-1 outline-none focus:border-blue-500 transition-all cursor-pointer">
              <option value="gemini-3.1-flash-lite-preview">Lite (fast)</option>
              <option value="gemini-3-flash-preview" selected>Pro (balanced)</option>
              <option value="gemini-3.1-pro-preview">Ultra (detailed)</option>
            </select>
          </div>
        </header>
        
        <!-- Tools Section -->
        <div class="px-6 py-3 border-b border-slate-800 bg-slate-900/50 flex flex-wrap gap-2 items-center">
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mr-2">Tools:</span>
          <button id="tool-web" class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-xs font-medium rounded-full border border-blue-500/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            Web Answer
          </button>
          <button id="tool-image" class="flex items-center gap-1.5 px-3 py-1.5 bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 text-xs font-medium rounded-full border border-purple-500/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            Generate Image
          </button>
          <button id="tool-video" class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 text-xs font-medium rounded-full border border-amber-500/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            Video Idea
          </button>
        </div>
        
        <main id="chat-container" class="flex-1 overflow-y-auto px-4 py-8 md:px-8 space-y-6 scroll-smooth">
          <!-- Messages will be injected here -->
          <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center p-8">
            <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-4 border border-blue-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-100 mb-2">Welcome to LevelUp AI Lab</h3>
            <p class="text-slate-400 max-w-sm">Start a new conversation to experiment with the power of Gemini.</p>
          </div>
        </main>
        
        <footer id="input-container" class="p-4 md:p-8 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
          <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="relative group">
              <textarea 
                id="chat-input" 
                rows="1"
                placeholder="Type your message here..." 
                class="w-full bg-slate-900 text-slate-200 border border-slate-800 rounded-2xl px-4 py-4 pr-14 focus:outline-none focus:border-blue-500 transition-all resize-none shadow-xl placeholder:text-slate-500"
              ></textarea>
              <button 
                type="submit" 
                id="send-button" 
                class="absolute right-2 top-2 bottom-2 px-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:scale-100 flex items-center justify-center"
                aria-label="Send message"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </form>
            <div class="text-[10px] text-center text-slate-600 mt-4 uppercase tracking-widest font-medium">
              Powered by Google Gemini 3 Flash
            </div>
          </div>
        </footer>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-slate-100 px-4 py-2 rounded-lg border border-slate-700 shadow-2xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400"><polyline points="20 6 9 17 4 12"></polyline></svg>
      <span id="toast-message">Copied to clipboard!</span>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
